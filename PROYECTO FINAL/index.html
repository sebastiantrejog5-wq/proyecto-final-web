<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="author" content="Sebastian Trejo">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrito de Compras</title>


	<link rel="stylesheet" href="estilos.css">
<script src="script.js"></script>

<header>
<h1>TIENDA ITNL</h1>                
<p>Proyecto Final - Carrito de Compras</p>

<nav>
<a href="#">Inicio</a>
<a href="#">Productos</a>
<a href="#">Contacto</a>
</nav>
</header>


<div class="contenedor">

<!-- PRODUCTOS -->
<section class="productos">
<h2>Listado de Productos</h2>

<div class="producto">
<img src="laptop.png" alt="Laptop">
<h3>Laptop</h3>
<p>Procesador i5 16GB RAM</p>
<p>$12000</p>
<button onclick="agregarProducto('Laptop',12000)">
Agregar
</button>
</div>

<div class="producto">
<img src="mouse.png" alt="Mouse">
<h3>Mouse Gamer</h3>
<p>RGB alta precisión</p>
<p>$450</p>
<button onclick="agregarProducto('Mouse Gamer',450)">
Agregar
</button>
</div>

<div class="producto">
<img src="teclado.png" alt="Teclado">
<h3>Teclado Mecánico</h3>
<p>Switch Blue</p>
<p>$950</p>
<button onclick="agregarProducto('Teclado Mecánico',950)">
Agregar
</button>
</div>

</section>


<!-- CARRITO -->
<section class="carrito">
<h2>Carrito de Compras</h2>

<table id="tablaCarrito">
<tr>
<th>Producto</th>
<th>Precio</th>
</tr>
</table>

<h3>Subtotal: $<span id="subtotal">0</span></h3>
<h3>Total: $<span id="total">0</span></h3>

<form>
<input type="button"
value="Imprimir Ticket"
onclick="window.print()">
</form>

</section>

</div>

<footer>
<p>Visita:
<a href="https://www.google.com">
Más productos
</a>
</p>
</footer>

<script src="script.js"></script>

</body>
</html>
